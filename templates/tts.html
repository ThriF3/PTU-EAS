<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Calculator | Text to Speech</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .nav-links {
            text-align: center;
            margin-bottom: 15px;
        }
        .nav-links a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            margin: 0 10px;
            transition: color 0.3s;
        }
        .nav-links a:hover {
            color: #60a5fa;
            text-decoration: underline;
        }
        .input-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 20px;
            border: 1px inset rgba(255, 255, 255, 0.05);
        }
        textarea {
            width: 100%;
            height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            color: var(--text-main);
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }
        textarea:focus {
            border-color: var(--primary);
        }
        .speak-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            box-shadow: 0 5px 15px -5px var(--primary-glow);
        }
        .speak-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -5px var(--primary-glow);
        }
        .speak-btn:active {
            transform: translateY(0);
        }
        .speak-btn.playing {
            background: #10b981;
            animation: pulse-green 1.5s infinite;
        }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>

    <div class="background-animation">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <div class="container">
        <div class="calculator-glass">
            <header>
                <h1>Text to Speech</h1>
                <p>Masukkan angka atau teks untuk dibacakan</p>
            </header>

            <div class="nav-links">
                <a href="/"><i class="fas fa-calculator"></i> Ke Kalkulator</a>
            </div>

            <div class="input-area">
                <textarea id="tts-input" placeholder="Ketik sesuatu di sini... (contoh: seratus dua puluh)"></textarea>
                <button id="speak-btn" class="speak-btn">
                    <i class="fas fa-volume-up"></i> Bacakan Teks
                </button>
                <div class="status-text" id="status-text">Siap</div>
            </div>
        </div>
    </div>

    <script>
        const speakBtn = document.getElementById('speak-btn');
        const ttsInput = document.getElementById('tts-input');
        const statusText = document.getElementById('status-text');

        speakBtn.addEventListener('click', async () => {
            const text = ttsInput.value.trim();
            if (!text) {
                statusText.textContent = "Teks tidak boleh kosong!";
                return;
            }

            speakBtn.classList.add('playing');
            statusText.textContent = "Sedang membacakan...";
            
            try {
                const response = await fetch('/speak', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    statusText.textContent = "Selesai dibacakan.";
                } else {
                    statusText.textContent = data.error || "Terjadi kesalahan server";
                }
            } catch (error) {
                console.error("Error:", error);
                statusText.textContent = "Gagal terhubung ke server";
            } finally {
                speakBtn.classList.remove('playing');
            }
        });
    </script>
</body>
</html>
